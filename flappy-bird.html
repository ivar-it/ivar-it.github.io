<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAPPY BIRD - APOCALYPSE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0000 0%, #3d0000 50%, #1a0000 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 600px;
            background: linear-gradient(180deg, #2d0a00 0%, #1a0000 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: #ff6b00;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 107, 0, 0.8);
            z-index: 10;
            pointer-events: none;
        }

        .score {
            text-align: center;
            transition: transform 0.1s ease-out;
        }

        .score.flash {
            animation: scoreFlash 0.4s ease-out;
        }

        @keyframes scoreFlash {
            0%   { transform: scale(1);    color: #ff6b00; text-shadow: 0 0 10px rgba(255,107,0,0.8); }
            30%  { transform: scale(1.5);  color: #ffffff; text-shadow: 0 0 20px rgba(255,200,0,1), 0 0 40px rgba(255,107,0,0.9); }
            60%  { transform: scale(1.2);  color: #ffcc00; text-shadow: 0 0 15px rgba(255,200,0,0.9); }
            100% { transform: scale(1);    color: #ff6b00; text-shadow: 0 0 10px rgba(255,107,0,0.8); }
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #ff6b00;
            font-size: 20px;
            z-index: 20;
            display: none;
            border: 3px solid #ff6b00;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .game-over.visible {
            opacity: 1;
        }

        .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 0, 1);
        }

        .game-over p {
            margin: 10px 0;
        }

        .game-over button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background: #ff6b00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .game-over button:hover {
            background: #ff8c00;
            transform: scale(1.05);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: #ff8c00;
            font-size: 14px;
            text-align: center;
            opacity: 0.7;
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 50px;
            border-radius: 10px;
            text-align: center;
            color: #ff6b00;
            z-index: 20;
            border: 3px solid #ff6b00;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .start-screen h1 {
            font-size: 54px;
            text-shadow: 0 0 20px rgba(255, 107, 0, 1);
            margin: 0;
        }

        .start-screen p {
            font-size: 18px;
            margin: 10px 0;
        }

        .start-screen .hint {
            font-size: 16px;
            color: #ff8c00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .motivation-popup {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            color: #ff8c00;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            z-index: 25;
            text-shadow:
                -1px -1px 0 rgba(0, 0, 0, 0.6),
                1px -1px 0 rgba(0, 0, 0, 0.6),
                -1px 1px 0 rgba(0, 0, 0, 0.6),
                1px 1px 0 rgba(0, 0, 0, 0.6),
                0 0 12px rgba(255, 140, 0, 0.6);
            display: none;
            animation: popupAppear 0.2s ease-out forwards;
            max-width: 80%;
            text-align: center;
            opacity: 0.6;
        }

        @keyframes popupAppear {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0.8);
            }
            100% {
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }
        }

        @keyframes popupDisappear {
            0% {
                opacity: 0.6;
                transform: translateX(-50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) scale(0.9);
            }
        }

        .motivation-popup.disappear {
            animation: popupDisappear 0.3s ease-in forwards;
        }

        .difficulty-selector {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 50px;
            border-radius: 10px;
            text-align: center;
            color: #ff6b00;
            z-index: 20;
            border: 3px solid #ff6b00;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .difficulty-selector h1 {
            font-size: 48px;
            text-shadow: 0 0 20px rgba(255, 107, 0, 1);
            margin: 0;
        }

        .difficulty-selector p {
            font-size: 18px;
            margin: 0;
            opacity: 0.8;
        }

        .difficulty-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficulty-btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #ff6b00;
            border-radius: 5px;
            background: rgba(255, 107, 0, 0.1);
            color: #ff6b00;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            min-width: 120px;
        }

        .difficulty-btn:hover {
            background: #ff6b00;
            color: #000;
            transform: scale(1.08);
        }

        .difficulty-btn.selected {
            background: #ff6b00;
            color: #000;
        }

        .difficulty-desc {
            font-size: 13px;
            color: #ff8c00;
            margin-top: 5px;
            min-height: 40px;
        }

        .streak-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffaa00;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 170, 0, 0.6);
            z-index: 10;
            pointer-events: none;
            text-align: right;
            opacity: 0.7;
        }

        .streak-display .streak-label {
            font-size: 10px;
            opacity: 0.6;
        }

        .combo-popup {
            position: absolute;
            top: 80px;
            right: 20px;
            transform: scale(0.8);
            color: #ffff00;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 32px;
            font-weight: bold;
            z-index: 26;
            text-shadow:
                -1px -1px 0 rgba(0, 0, 0, 0.7),
                1px -1px 0 rgba(0, 0, 0, 0.7),
                -1px 1px 0 rgba(0, 0, 0, 0.7),
                1px 1px 0 rgba(0, 0, 0, 0.7),
                0 0 15px rgba(255, 255, 0, 0.8);
            display: none;
            animation: comboPopupAppear 0.2s ease-out forwards;
            max-width: 85%;
            text-align: center;
            opacity: 0.7;
        }

        @keyframes comboPopupAppear {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 0.7;
                transform: scale(1);
            }
        }

        @keyframes comboPopupDisappear {
            0% {
                opacity: 0.7;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.8);
            }
        }

        .combo-popup.disappear {
            animation: comboPopupDisappear 0.3s ease-in forwards;
        }

        .power-up-display {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .power-up-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 200, 0, 0.5);
            animation: powerUpBounce 0.3s ease-out;
        }

        .power-up-item.shield {
            border-color: #4da6ff;
            color: #4da6ff;
            text-shadow: 0 0 12px rgba(77, 166, 255, 0.8);
        }

        .power-up-item.powbomb {
            border-color: #ff4500;
            color: #ff4500;
            text-shadow: 0 0 12px rgba(255, 69, 0, 0.8);
        }

        .power-up-item.doublepoints {
            border-color: #ffd700;
            color: #ffd700;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.8);
        }

        .power-up-item.expiring {
            animation: powerUpFlash 0.5s infinite;
        }

        @keyframes powerUpBounce {
            0% {
                opacity: 0;
                transform: scale(0.5) translateX(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateX(0);
            }
        }

        @keyframes powerUpFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .multiplier-display {
            position: absolute;
            top: 60px;
            left: 20px;
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            z-index: 10;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="gameContainer">
        <div class="ui">
            <div class="score" id="scoreDisplay">Score: <span id="score">0</span></div>
        </div>
        <div class="streak-display" id="streakDisplay">
            <div class="streak-label">STREAK</div>
            <div id="streakCount">0</div>
        </div>
        <div class="power-up-display" id="powerUpDisplay"></div>
        <div class="multiplier-display" id="multiplierDisplay">SCORE x<span id="multiplier">1</span></div>
        <canvas id="gameCanvas"></canvas>
        <div class="game-over" id="gameOverScreen">
            <h1>&#9760;&#65039; GAME OVER &#9760;&#65039;</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>
            <button onclick="location.reload()">RESTART</button>
        </div>
        <div class="start-screen" id="startScreen">
            <h1>FLAPPY BIRD</h1>
            <p>APOCALYPSE</p>
            <div class="hint">&#8593; TAP or CLICK to START &#8593;</div>
        </div>
        <div class="motivation-popup" id="motivationPopup"></div>
        <div class="combo-popup" id="comboPopup"></div>
        <div class="difficulty-selector" id="difficultySelector">
            <h1>SELECT DIFFICULTY</h1>
            <p>Choose your apocalyptic fate...</p>
            <div class="difficulty-buttons">
                <button class="difficulty-btn" data-difficulty="easy">
                    Easy
                    <div class="difficulty-desc">Slow pipes, relaxed</div>
                </button>
                <button class="difficulty-btn" data-difficulty="normal">
                    Normal
                    <div class="difficulty-desc">Classic Flappy challenge</div>
                </button>
                <button class="difficulty-btn" data-difficulty="hard">
                    Hard
                    <div class="difficulty-desc">Fast pipes, tight gaps</div>
                </button>
                <button class="difficulty-btn" data-difficulty="insane">
                    Insane
                    <div class="difficulty-desc">Max chaos, fast gaps</div>
                </button>
            </div>
        </div>
        <div class="instructions">TAP or CLICK to fly &bull; Avoid pipes</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');

        // Responsive canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth > 600 ? 600 : window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Difficulty settings
        const difficultySettings = {
            easy: {
                gravity: 0.25,
                lift: -5,
                pipeSpeed: 2,
                pipeGap: 250,
                pipeFrequency: 110,
                streakThreshold: 8,
                label: 'EASY'
            },
            normal: {
                gravity: 0.35,
                lift: -5,
                pipeSpeed: 3,
                pipeGap: 210,
                pipeFrequency: 90,
                streakThreshold: 5,
                label: 'NORMAL'
            },
            hard: {
                gravity: 0.42,
                lift: -5.5,
                pipeSpeed: 4,
                pipeGap: 180,
                pipeFrequency: 75,
                streakThreshold: 3,
                label: 'HARD'
            },
            insane: {
                gravity: 0.5,
                lift: -6,
                pipeSpeed: 5,
                pipeGap: 150,
                pipeFrequency: 60,
                streakThreshold: 2,
                label: 'INSANE'
            }
        };

        // ─── Power-up system ──────────────────────────────────────────────
        const powerUps = [];
        let basePipeSpeed = 3;
        let baseGravity = 0.35;
        let pointMultiplier = 1;

        const powerUpTypes = {
            shield: {
                color: '#4da6ff',
                icon: 'shield',
                duration: Infinity,
                effect: 'Survive 1 collision',
                glowColor: 'rgba(77, 166, 255, 0.4)'
            },
            powbomb: {
                color: '#ff4500',
                icon: 'explosion',
                duration: Infinity,
                effect: 'Clear all pipes!',
                glowColor: 'rgba(255, 69, 0, 0.5)'
            },
            doublepoints: {
                color: '#ffd700',
                icon: 'star',
                duration: 15000,
                effect: 'Score x2',
                glowColor: 'rgba(255, 215, 0, 0.3)'
            }
        };

        // Game objects
        const game = {
            score: 0,
            highScore: localStorage.getItem('flappyBirdHighScore') || 0,
            gameOver: false,
            started: false,
            difficulty: 'normal',
            streak: 0,
            maxStreak: localStorage.getItem('flappyBirdMaxStreak') || 0,
            activePowerUps: {
                shield: null,
                powbomb: null,
                doublepoints: null
            },
            invulnerable: false,
            invulnerabilityTimer: 0
        };

        const bird = {
            x: canvas.width * 0.2,
            y: canvas.height / 2,
            radius: 15,
            velocity: 0,
            gravity: 0.35,
            lift: -5,
            color: '#ff6b00',
            rotation: 0      // radians; 0 = flat, positive = nose-down
        };

        const pipes = [];
        let pipeGap = 210;
        const pipeWidth = 50;
        let pipeCounter = 0;
        let pipeSpeed = 3;
        let pipeFrequency = 90;
        const version = '0.4.0';
        let scrollOffset = 0;

        // ─── Particle system ───────────────────────────────────────────────
        const particles = [];

        function spawnPipeParticles(x, y) {
            const count = 6 + Math.floor(Math.random() * 3); // 6-8
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.8;
                const speed = 2.5 + Math.random() * 3;
                const colors = ['#ff6b00', '#ff4500', '#ff8c00', '#ff2200', '#ffaa00'];
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1, // slight upward bias
                    life: 1.0,
                    decay: 0.025 + Math.random() * 0.02,
                    radius: 3 + Math.random() * 4,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.12; // gentle gravity
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // ─── Jump ring / visual feedback ───────────────────────────────────
        const jumpRings = [];

        function spawnJumpRing() {
            jumpRings.push({
                x: bird.x,
                y: bird.y,
                radius: bird.radius,
                life: 1.0
            });
        }

        function updateJumpRings() {
            for (let i = jumpRings.length - 1; i >= 0; i--) {
                const r = jumpRings[i];
                r.radius += 2.5;
                r.life -= 0.07;
                if (r.life <= 0) jumpRings.splice(i, 1);
            }
        }

        function drawJumpRings() {
            jumpRings.forEach(r => {
                ctx.save();
                ctx.globalAlpha = Math.max(0, r.life * 0.7);
                ctx.strokeStyle = '#ff8c00';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ff6b00';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            });
        }

        // ─── Screen shake ──────────────────────────────────────────────────
        const shake = {
            intensity: 0,
            duration: 0,
            offsetX: 0,
            offsetY: 0
        };

        function triggerShake(intensity = 5, duration = 15) {
            shake.intensity = intensity;
            shake.duration = duration;
        }

        function triggerExplosionShake(intensity = 8, duration = 12) {
            shake.intensity = intensity;
            shake.duration = duration;
        }

        function updateShake() {
            if (shake.duration > 0) {
                // Optimize: only apply X offset for snappier performance
                shake.offsetX = (Math.random() - 0.5) * shake.intensity;
                shake.offsetY = 0;
                shake.duration--;
                shake.intensity *= 0.9; // dampen
            } else {
                shake.offsetX = 0;
                shake.offsetY = 0;
            }
        }

        // ─── Audio ────────────────────────────────────────────────────────
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }

        function jumpSound() {
            playSound(400, 0.1);
        }

        function scoreSound() {
            playSound(800, 0.15);
            setTimeout(() => playSound(1000, 0.15), 75);
        }

        function gameOverSound() {
            playSound(200, 0.5);
        }

        function collectPowerUpSound() {
            playSound(1200, 0.08);
            setTimeout(() => playSound(1400, 0.08), 50);
        }

        function shieldBlockSound() {
            playSound(600, 0.2);
            setTimeout(() => playSound(800, 0.2), 100);
        }

        function playPowSound() {
            playSound(300, 0.05, 'square');
            setTimeout(() => playSound(150, 0.1, 'square'), 50);
        }

        let screenFlash = {
            active: false,
            duration: 0,
            maxDuration: 100
        };

        function triggerScreenFlash() {
            screenFlash.active = true;
            screenFlash.duration = screenFlash.maxDuration;
        }

        let musicPlaying = false;
        let musicTimeoutId = null;

        function playMelodySequence() {
            const melody = [
                { freq: 110, duration: 0.35 },
                { freq: 130, duration: 0.35 },
                { freq: 110, duration: 0.35 },
                { freq: 130, duration: 0.35 },
                { freq: 110, duration: 0.7 },
                { freq: 165, duration: 0.35 },
                { freq: 220, duration: 0.35 },
                { freq: 246, duration: 0.7 },
                { freq: 196, duration: 0.35 },
                { freq: 165, duration: 0.35 },
                { freq: 130, duration: 0.35 },
                { freq: 98,  duration: 0.7 },
                { freq: 130, duration: 0.35 },
                { freq: 165, duration: 0.35 },
                { freq: 196, duration: 0.35 },
                { freq: 220, duration: 0.7 },
            ];

            if (!musicPlaying) return;

            let delay = 0;
            melody.forEach(note => {
                if (musicPlaying) {
                    setTimeout(() => {
                        if (musicPlaying) playSound(note.freq, note.duration * 0.8, 'sawtooth');
                    }, delay * 1000);
                }
                delay += note.duration + 0.05;
            });

            musicTimeoutId = setTimeout(() => {
                if (musicPlaying) playMelodySequence();
            }, 8500);
        }

        function playStartMusic() {
            if (musicPlaying) return;
            musicPlaying = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playMelodySequence();
        }

        function stopStartMusic() {
            musicPlaying = false;
            if (musicTimeoutId) clearTimeout(musicTimeoutId);
        }

        // ─── Message queue system for popups ──────────────────────────────
        const popupManager = {
            queue: [],
            currentPopup: null,
            isProcessing: false,

            enqueue(type, message, duration) {
                this.queue.push({ type, message, duration });
                this.process();
            },

            process() {
                if (this.isProcessing || this.queue.length === 0) return;

                // Filter queue to ensure streak messages have priority
                // Remove motivational if streak is waiting
                const hasStreak = this.queue.some(m => m.type === 'streak');
                if (hasStreak) {
                    this.queue = this.queue.filter(m => m.type === 'streak' || m.type === 'active');
                }

                const next = this.queue.shift();
                if (!next) return;

                this.show(next.type, next.message, next.duration);
            },

            show(type, message, duration) {
                this.isProcessing = true;
                const popupId = type === 'streak' ? 'comboPopup' : 'motivationPopup';
                const popup = document.getElementById(popupId);

                popup.textContent = message;
                popup.style.display = 'block';
                popup.classList.remove('disappear');

                setTimeout(() => {
                    popup.classList.add('disappear');
                    setTimeout(() => {
                        popup.style.display = 'none';
                        this.isProcessing = false;
                        this.process();
                    }, 200);
                }, duration);
            }
        };

        // ─── Motivational messages ─────────────────────────────────────────
        const motivationalMessages = [
            '\uD83D\uDD25 INSANE! \uD83D\uDD25',
            '\u2620\uFE0F UNSTOPPABLE \u2620\uFE0F',
            '\uD83D\uDC80 LEGEND! \uD83D\uDC80',
            '\uD83C\uDF2A\uFE0F APOCALYPTIC! \uD83C\uDF2A\uFE0F',
            '\u26A1 BEAST MODE \u26A1',
            '\uD83D\uDD25 DOMINATING! \uD83D\uDD25',
            '\uD83D\uDCA5 DESTRUCTIVE! \uD83D\uDCA5',
            '\uD83D\uDC51 SURVIVOR \uD83D\uDC51',
            '\uD83C\uDFAF FLAWLESS! \uD83C\uDFAF',
            '\uD83C\uDF2A\uFE0F ON FIRE! \uD83C\uDF2A\uFE0F'
        ];

        function showMotivation() {
            const message = motivationalMessages[Math.floor(Math.random() * motivationalMessages.length)];
            popupManager.enqueue('motivational', message, 2000);
        }

        // ─── Combo/Streak system ──────────────────────────────────────────
        const streakMessages = [
            '🔥 x2 COMBO!',
            '⚡ x3 COMBO!!',
            '💥 x5 COMBO!!!',
            '🌪️ x7 MEGA!!',
            '☠️ x10 APOCALYPTIC!!',
            '🔥 STREAK ON FIRE!'
        ];

        function updateStreakDisplay() {
            document.getElementById('streakCount').textContent = game.streak;
        }

        function showComboPopup(multiplier) {
            const message = streakMessages[Math.min(streakMessages.length - 1, Math.floor(multiplier / 2))];
            popupManager.enqueue('streak', message, 1500);
        }

        function addToStreak() {
            const streakThreshold = difficultySettings[game.difficulty].streakThreshold;
            game.streak++;

            if (game.streak > game.maxStreak) {
                game.maxStreak = game.streak;
                localStorage.setItem('flappyBirdMaxStreak', game.maxStreak);
            }

            updateStreakDisplay();

            if (game.streak % streakThreshold === 0) {
                showComboPopup(game.streak);
                playSound(600, 0.2);
                setTimeout(() => playSound(700, 0.2), 100);
            }
        }

        function resetStreak() {
            game.streak = 0;
            updateStreakDisplay();
        }

        // ─── Power-up management ──────────────────────────────────────────
        function spawnPowerUp(x, y) {
            const types = ['shield', 'powbomb', 'doublepoints'];
            const type = types[Math.floor(Math.random() * types.length)];
            powerUps.push({
                x: x,
                y: y,
                type: type,
                collected: false,
                spawnTime: Date.now(),
                lifetime: 15000, // 15 seconds before disappear
                rotation: 0
            });
        }

        function activatePowerUp(type) {
            const now = Date.now();
            game.activePowerUps[type] = {
                startTime: now,
                duration: powerUpTypes[type].duration
            };

            if (type === 'shield') {
                // Shield shows visual indicator on bird
            } else if (type === 'powbomb') {
                // POW-Bomb: clear all active pipes
                playPowSound();
                triggerScreenFlash();
                triggerExplosionShake();
                spawnExplosionParticles();
                pipes.length = 0; // Clear all pipes
                // Immediately remove powbomb from active powerups (instantaneous effect)
                game.activePowerUps[type] = null;
                updatePowerUpDisplay();
                return;
            } else if (type === 'doublepoints') {
                pointMultiplier = 2;
                updateMultiplierDisplay();
            }

            collectPowerUpSound();
            updatePowerUpDisplay();
        }

        function deactivatePowerUp(type) {
            if (type === 'powbomb') {
                // POW-Bomb has no deactivation (instantaneous effect)
            } else if (type === 'doublepoints') {
                pointMultiplier = 1;
                updateMultiplierDisplay();
            }
            game.activePowerUps[type] = null;
            updatePowerUpDisplay();
        }

        function updatePowerUpDisplay() {
            const display = document.getElementById('powerUpDisplay');
            display.innerHTML = '';

            Object.keys(game.activePowerUps).forEach(type => {
                const active = game.activePowerUps[type];
                if (!active) return;

                const element = document.createElement('div');
                element.className = `power-up-item ${type}`;

                let timeRemaining = 'ACTIVE';
                if (active.duration !== Infinity) {
                    const elapsed = Date.now() - active.startTime;
                    const remaining = Math.ceil((active.duration - elapsed) / 1000);
                    timeRemaining = `${remaining}s`;

                    // Flash when about to expire (< 3 seconds)
                    if (remaining <= 3 && remaining > 0) {
                        element.classList.add('expiring');
                    }
                }

                const icon = getIconSymbol(type);
                element.textContent = `${icon} ${powerUpTypes[type].effect} - ${timeRemaining}`;
                display.appendChild(element);
            });
        }

        function updateMultiplierDisplay() {
            const display = document.getElementById('multiplierDisplay');
            const multiplier = document.getElementById('multiplier');
            if (pointMultiplier > 1) {
                display.style.display = 'block';
                multiplier.textContent = pointMultiplier;
            } else {
                display.style.display = 'none';
            }
        }

        function getIconSymbol(type) {
            switch (type) {
                case 'shield': return '🛡️';
                case 'powbomb': return '💥';
                case 'doublepoints': return '⭐';
                default: return '✨';
            }
        }

        function updateActivePowerUps() {
            const now = Date.now();

            Object.keys(game.activePowerUps).forEach(type => {
                const active = game.activePowerUps[type];
                if (!active) return;

                // Check if duration expired (but not shield, which is Infinity)
                if (active.duration !== Infinity) {
                    const elapsed = now - active.startTime;
                    if (elapsed >= active.duration) {
                        deactivatePowerUp(type);
                    }
                }
            });

            updatePowerUpDisplay();
        }

        function spawnPowerUpParticles(x, y, type) {
            const count = 12;
            const color = powerUpTypes[type].color;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
                const speed = 2 + Math.random() * 3;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    life: 1.0,
                    decay: 0.03 + Math.random() * 0.02,
                    radius: 2 + Math.random() * 3,
                    color: color
                });
            }
        }

        function spawnExplosionParticles() {
            const count = 24;
            const colors = ['#ff4500', '#ff6b00', '#ff8c00', '#ffaa00', '#ff2200'];
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
                const speed = 3 + Math.random() * 5;
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 0.5,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.015,
                    radius: 4 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        // ─── Draw power-ups ────────────────────────────────────────────────
        function drawPowerUps() {
            powerUps.forEach((pu, index) => {
                if (pu.collected) return;

                const elapsed = Date.now() - pu.spawnTime;
                const alpha = elapsed < pu.lifetime * 0.7 ? 1.0 : 0.3 + (1 - (elapsed / pu.lifetime)) * 0.7;

                if (alpha <= 0.1) return;

                pu.rotation += 0.08;
                const size = 75;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(pu.x, pu.y);
                ctx.rotate(pu.rotation);

                // Glow effect
                const glowColor = powerUpTypes[pu.type].glowColor;
                const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.8);
                glowGrad.addColorStop(0, glowColor);
                glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
                ctx.fill();

                // Draw power-up icon based on type
                if (pu.type === 'shield') {
                    drawShieldIcon(0, 0, size * 0.5);
                } else if (pu.type === 'powbomb') {
                    drawBombIcon(0, 0, size * 0.5);
                } else if (pu.type === 'doublepoints') {
                    drawStarIcon(0, 0, size * 0.5);
                }

                ctx.restore();
            });
        }

        function drawShieldIcon(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.strokeStyle = '#4da6ff';
            ctx.fillStyle = 'rgba(77, 166, 255, 0.3)';
            ctx.lineWidth = 3;

            // Shield shape
            ctx.beginPath();
            ctx.moveTo(-size * 0.3, -size * 0.5);
            ctx.lineTo(size * 0.3, -size * 0.5);
            ctx.lineTo(size * 0.35, size * 0.2);
            ctx.bezierCurveTo(size * 0.3, size * 0.4, 0, size * 0.5, -size * 0.35, size * 0.2);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawBombIcon(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#ff4500';
            ctx.strokeStyle = '#ff6b00';
            ctx.lineWidth = 2;

            // Main bomb sphere
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.4);
            grad.addColorStop(0, '#ff6b00');
            grad.addColorStop(1, '#cc3300');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Fuse (curved line)
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, size * 0.1 - size * 0.4);
            ctx.quadraticCurveTo(size * 0.15, -size * 0.3, size * 0.2, -size * 0.5);
            ctx.stroke();

            // Spark at fuse tip
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(size * 0.2, -size * 0.5, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawStarIcon(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#ffd700';
            ctx.strokeStyle = '#ffff99';
            ctx.lineWidth = 2;

            // Draw 5-pointed star
            const points = 5;
            const outerRadius = size * 0.5;
            const innerRadius = size * 0.22;

            ctx.beginPath();
            for (let i = 0; i < points * 2; i++) {
                const radius = i % 2 === 0 ? outerRadius : innerRadius;
                const angle = (i * Math.PI) / points - Math.PI / 2;
                const px = Math.cos(angle) * radius;
                const py = Math.sin(angle) * radius;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        // ─── Draw bird (with rotation) ─────────────────────────────────────
        function drawBird() {
            // Target rotation: clamp velocity-based tilt between -30deg and +70deg
            const targetRotation = Math.max(-0.52, Math.min(1.22, bird.velocity * 0.065));
            // Smooth interpolation
            bird.rotation += (targetRotation - bird.rotation) * 0.18;

            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation);

            // Body glow
            const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, bird.radius * 1.8);
            glowGrad.addColorStop(0, 'rgba(255, 140, 0, 0.35)');
            glowGrad.addColorStop(1, 'rgba(255, 107, 0, 0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius * 1.8, 0, Math.PI * 2);
            ctx.fill();

            // Main body
            const bodyGrad = ctx.createRadialGradient(-3, -4, 2, 0, 0, bird.radius);
            bodyGrad.addColorStop(0, '#ffaa00');
            bodyGrad.addColorStop(0.5, '#ff6b00');
            bodyGrad.addColorStop(1, '#cc3300');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = 'rgba(200, 60, 0, 0.7)';
            ctx.beginPath();
            ctx.ellipse(-4, 4, 8, 5, -0.4, 0, Math.PI * 2);
            ctx.fill();

            // Beak (pointing right, the direction of travel)
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.moveTo(bird.radius - 2, -2);
            ctx.lineTo(bird.radius + 7, 0);
            ctx.lineTo(bird.radius - 2, 3);
            ctx.closePath();
            ctx.fill();

            // Eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(6, -5, 4, 0, Math.PI * 2);
            ctx.fill();
            // Eye highlight
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(7, -6, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Shield overlay if active
            if (game.activePowerUps.shield) {
                ctx.globalAlpha = 0.6;
                const shieldGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, bird.radius * 2.2);
                shieldGrad.addColorStop(0, 'rgba(77, 166, 255, 0.4)');
                shieldGrad.addColorStop(1, 'rgba(77, 166, 255, 0)');
                ctx.fillStyle = shieldGrad;
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius * 2.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.globalAlpha = 1;
                ctx.strokeStyle = '#4da6ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius * 1.5, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Invulnerability glow (pulsing cyan/bright blue)
            if (game.invulnerable) {
                const pulseIntensity = 0.5 + Math.sin((1000 - game.invulnerabilityTimer) / 150) * 0.5;
                ctx.globalAlpha = pulseIntensity * 0.7;

                const invulnGrad = ctx.createRadialGradient(0, 0, bird.radius * 0.8, 0, 0, bird.radius * 2.5);
                invulnGrad.addColorStop(0, 'rgba(0, 255, 255, 0.8)');
                invulnGrad.addColorStop(0.5, 'rgba(0, 200, 255, 0.4)');
                invulnGrad.addColorStop(1, 'rgba(0, 150, 255, 0)');
                ctx.fillStyle = invulnGrad;
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius * 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Outer pulsing ring
                ctx.globalAlpha = pulseIntensity * 0.5;
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.9)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(0, 0, bird.radius * 2, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.restore();
        }

        // ─── Draw pipes (with 3-D depth effect) ───────────────────────────
        function drawPipes() {
            pipes.forEach(pipe => {
                const px = pipe.x;
                const pw = pipeWidth;

                // ── Top pipe ──────────────────────────────────────────────
                // Main body — side-lit gradient for 3-D look
                const topGrad = ctx.createLinearGradient(px, 0, px + pw, 0);
                topGrad.addColorStop(0,   '#550000');
                topGrad.addColorStop(0.15,'#8b0000');
                topGrad.addColorStop(0.45,'#aa1100');
                topGrad.addColorStop(0.7, '#7a0000');
                topGrad.addColorStop(1,   '#440000');
                ctx.fillStyle = topGrad;
                ctx.fillRect(px, 0, pw, pipe.top - 8);

                // Vertical highlight stripe
                ctx.fillStyle = 'rgba(255,80,0,0.12)';
                ctx.fillRect(px + pw * 0.25, 0, pw * 0.2, pipe.top - 8);

                // Rivet marks every ~40px
                ctx.fillStyle = 'rgba(255,60,0,0.25)';
                for (let ry = 30; ry < pipe.top - 16; ry += 40) {
                    ctx.beginPath();
                    ctx.arc(px + pw * 0.25, ry, 2.5, 0, Math.PI * 2);
                    ctx.arc(px + pw * 0.75, ry, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Rim cap
                ctx.fillStyle = '#cc2200';
                ctx.fillRect(px - 4, pipe.top - 12, pw + 8, 12);
                // Rim bevel top edge
                ctx.fillStyle = '#ff6b00';
                ctx.fillRect(px - 4, pipe.top - 12, pw + 8, 3);
                // Rim inner shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(px - 4, pipe.top - 3, pw + 8, 3);

                // ── Bottom pipe ───────────────────────────────────────────
                const botGrad = ctx.createLinearGradient(px, pipe.bottom, px + pw, pipe.bottom);
                botGrad.addColorStop(0,   '#550000');
                botGrad.addColorStop(0.15,'#8b0000');
                botGrad.addColorStop(0.45,'#aa1100');
                botGrad.addColorStop(0.7, '#7a0000');
                botGrad.addColorStop(1,   '#440000');
                ctx.fillStyle = botGrad;
                ctx.fillRect(px, pipe.bottom + 12, pw, canvas.height - pipe.bottom);

                // Vertical highlight stripe
                ctx.fillStyle = 'rgba(255,80,0,0.12)';
                ctx.fillRect(px + pw * 0.25, pipe.bottom + 12, pw * 0.2, canvas.height - pipe.bottom);

                // Rivet marks
                ctx.fillStyle = 'rgba(255,60,0,0.25)';
                for (let ry = pipe.bottom + 30; ry < canvas.height - 10; ry += 40) {
                    ctx.beginPath();
                    ctx.arc(px + pw * 0.25, ry, 2.5, 0, Math.PI * 2);
                    ctx.arc(px + pw * 0.75, ry, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Rim cap
                ctx.fillStyle = '#cc2200';
                ctx.fillRect(px - 4, pipe.bottom, pw + 8, 12);
                // Rim bevel bottom edge
                ctx.fillStyle = '#ff6b00';
                ctx.fillRect(px - 4, pipe.bottom + 9, pw + 8, 3);
                // Rim inner shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(px - 4, pipe.bottom, pw + 8, 3);
            });
        }

        // ─── Draw background ───────────────────────────────────────────────
        function drawBackground() {
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#3d0a00');
            skyGradient.addColorStop(0.5, '#2d0a00');
            skyGradient.addColorStop(1, '#1a0000');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const groundY = canvas.height * 0.85;
            ctx.fillStyle = '#4a1a00';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

            ctx.strokeStyle = 'rgba(255, 107, 0, 0.2)';
            ctx.lineWidth = 1;
            for (let i = -1; i < 3; i++) {
                const x = (i * 60 + scrollOffset) % canvas.width;
                ctx.beginPath();
                ctx.moveTo(x, groundY);
                ctx.lineTo(x + 30, groundY - 10);
                ctx.stroke();
            }

            ctx.fillStyle = 'rgba(255, 107, 0, 0.1)';
            for (let i = 0; i < 5; i++) {
                const x = (i * 120 + scrollOffset * 0.5) % canvas.width;
                ctx.beginPath();
                ctx.arc(x, canvas.height * 0.4, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ─── Score flash ───────────────────────────────────────────────────
        function flashScore() {
            const el = document.getElementById('scoreDisplay');
            el.classList.remove('flash');
            // Force reflow so re-adding the class re-triggers animation
            void el.offsetWidth;
            el.classList.add('flash');
        }

        // ─── Update ────────────────────────────────────────────────────────
        function update() {
            if (game.gameOver || !game.started) return;

            scrollOffset += 1;

            // Bird physics
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Update invulnerability timer
            if (game.invulnerable) {
                game.invulnerabilityTimer -= 16; // ~60fps, ~16ms per frame
                if (game.invulnerabilityTimer <= 0) {
                    game.invulnerable = false;
                    game.invulnerabilityTimer = 0;
                }
            }

            // Update rings & particles & power-ups
            updateJumpRings();
            updateParticles();
            updateActivePowerUps();

            // Generate pipes
            pipeCounter++;
            if (pipeCounter > pipeFrequency) {
                const gapStart = Math.random() * (canvas.height - pipeGap - 50) + 25;
                const pipe = {
                    x: canvas.width,
                    top: gapStart,
                    bottom: gapStart + pipeGap,
                    scored: false
                };
                pipes.push(pipe);

                // Spawn power-up in the gap with rare chance (5-10%)
                if (Math.random() < 0.075) {
                    const powerUpY = gapStart + pipeGap / 2;
                    spawnPowerUp(canvas.width, powerUpY);
                }

                pipeCounter = 0;
            }

            // Update pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= pipeSpeed;

                if (!pipe.scored && pipe.x + pipeWidth < bird.x) {
                    pipe.scored = true;
                    game.score += pointMultiplier;
                    addToStreak();
                    document.getElementById('score').textContent = game.score;
                    scoreSound();
                    flashScore();
                    // Burst particles at the gap midpoint beside the bird
                    spawnPipeParticles(bird.x, pipe.top + pipeGap / 2);

                    if (game.score % 10 === 0) showMotivation();
                }

                if (pipe.x + pipeWidth < 0) pipes.splice(index, 1);
            });

            // Update power-ups
            powerUps.forEach((pu, index) => {
                pu.x -= pipeSpeed;
                const elapsed = Date.now() - pu.spawnTime;

                if (elapsed > pu.lifetime) {
                    powerUps.splice(index, 1);
                    return;
                }

                // Check proximity to bird for collection (no collision needed)
                const dx = pu.x - bird.x;
                const dy = pu.y - bird.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < bird.radius + 40 && !pu.collected) {
                    pu.collected = true;
                    spawnPowerUpParticles(pu.x, pu.y, pu.type);
                    activatePowerUp(pu.type);
                }

                if (pu.x + 50 < 0) powerUps.splice(index, 1);
            });

            // Boundary collision
            if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
                // Skip collision if invulnerable
                if (game.invulnerable) return;

                // Check if shield is active
                if (game.activePowerUps.shield) {
                    shieldBlockSound();
                    spawnPowerUpParticles(bird.x, bird.y, 'shield');
                    deactivatePowerUp('shield');
                    triggerShake(9, 20);
                    // Activate invulnerability period
                    game.invulnerable = true;
                    game.invulnerabilityTimer = 1000;
                    return;
                }
                endGame();
                return;
            }

            // Pipe collision
            pipes.forEach(pipe => {
                if (
                    bird.x + bird.radius > pipe.x &&
                    bird.x - bird.radius < pipe.x + pipeWidth &&
                    (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.bottom)
                ) {
                    // Skip collision if invulnerable
                    if (game.invulnerable) return;

                    triggerShake(9, 20);

                    // Check if shield is active
                    if (game.activePowerUps.shield) {
                        shieldBlockSound();
                        spawnPowerUpParticles(bird.x, bird.y, 'shield');
                        deactivatePowerUp('shield');
                        // Activate invulnerability period
                        game.invulnerable = true;
                        game.invulnerabilityTimer = 1000;
                        return;
                    }

                    endGame();
                }
            });
        }

        // ─── Draw ──────────────────────────────────────────────────────────
        function draw() {
            updateShake();

            ctx.save();
            ctx.translate(shake.offsetX, shake.offsetY);

            drawBackground();
            drawParticles();
            drawPipes();
            drawPowerUps();
            drawJumpRings();
            drawBird();

            ctx.fillStyle = '#ff6b00';
            ctx.font = '14px Arial';
            ctx.fillText('v' + version, 10, 25);

            ctx.restore();

            // Draw screen flash effect
            if (screenFlash.active) {
                const flashAlpha = screenFlash.duration / screenFlash.maxDuration;
                ctx.save();
                ctx.globalAlpha = flashAlpha * 0.6;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
                screenFlash.duration -= 16; // ~60fps
                if (screenFlash.duration <= 0) {
                    screenFlash.active = false;
                }
            }
        }

        // ─── Game loop ─────────────────────────────────────────────────────
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ─── End game ──────────────────────────────────────────────────────
        function endGame() {
            if (game.gameOver) return; // guard against double-trigger
            game.gameOver = true;
            resetStreak();

            // Reset invulnerability
            game.invulnerable = false;
            game.invulnerabilityTimer = 0;

            // Reset all active power-ups
            Object.keys(game.activePowerUps).forEach(type => {
                if (game.activePowerUps[type]) {
                    deactivatePowerUp(type);
                }
            });

            // Clear power-ups array
            powerUps.length = 0;
            pointMultiplier = 1;
            updateMultiplierDisplay();

            gameOverSound();

            const screen = document.getElementById('gameOverScreen');
            screen.style.display = 'block';
            // Trigger CSS fade-in on next frame
            requestAnimationFrame(() => {
                requestAnimationFrame(() => { screen.classList.add('visible'); });
            });

            document.getElementById('finalScore').textContent = game.score;

            if (game.score > game.highScore) {
                game.highScore = game.score;
                localStorage.setItem('flappyBirdHighScore', game.highScore);
            }
            document.getElementById('highScore').textContent = game.highScore;

            playStartMusic();
        }

        // ─── Difficulty selection ──────────────────────────────────────────
        function selectDifficulty(difficulty) {
            game.difficulty = difficulty;
            const settings = difficultySettings[difficulty];

            // Apply difficulty settings
            bird.gravity = settings.gravity;
            baseGravity = settings.gravity;
            bird.lift = settings.lift;
            pipeSpeed = settings.pipeSpeed;
            basePipeSpeed = settings.pipeSpeed;
            pipeGap = settings.pipeGap;
            pipeFrequency = settings.pipeFrequency;

            // Hide difficulty selector and start the game immediately
            document.getElementById('difficultySelector').style.display = 'none';
            stopStartMusic();
            game.started = true;

            // Highlight selected difficulty
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.difficulty === difficulty) {
                    btn.classList.add('selected');
                }
            });
        }

        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                selectDifficulty(btn.dataset.difficulty);
            });
        });

        // ─── Controls ──────────────────────────────────────────────────────
        document.addEventListener('click', fly);
        document.addEventListener('touchstart', fly);

        function fly(e) {
            e.preventDefault();

            if (game.gameOver) {
                location.reload();
                return;
            }

            if (game.started) {
                bird.velocity = bird.lift;
                jumpSound();
                spawnJumpRing();
            }
        }

        // ─── Boot ──────────────────────────────────────────────────────────
        gameLoop();

        // Initialize UI
        setTimeout(() => { playStartMusic(); }, 100);
        document.getElementById('highScore').textContent = game.highScore;
        updateStreakDisplay();
        // Difficulty selector shown on page load for user to choose
    </script>
</body>
</html>
