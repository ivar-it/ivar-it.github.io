<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAPPY BIRD - APOCALYPSE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0000 0%, #3d0000 50%, #1a0000 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 600px;
            background: linear-gradient(180deg, #2d0a00 0%, #1a0000 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: #ff6b00;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 107, 0, 0.8);
            z-index: 10;
        }

        .score {
            text-align: center;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #ff6b00;
            font-size: 20px;
            z-index: 20;
            display: none;
            border: 3px solid #ff6b00;
        }

        .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 107, 0, 1);
        }

        .game-over p {
            margin: 10px 0;
        }

        .game-over button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background: #ff6b00;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .game-over button:hover {
            background: #ff8c00;
            transform: scale(1.05);
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: #ff8c00;
            font-size: 14px;
            text-align: center;
            opacity: 0.7;
        }

        .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 50px;
            border-radius: 10px;
            text-align: center;
            color: #ff6b00;
            z-index: 20;
            border: 3px solid #ff6b00;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .start-screen h1 {
            font-size: 54px;
            text-shadow: 0 0 20px rgba(255, 107, 0, 1);
            margin: 0;
        }

        .start-screen p {
            font-size: 18px;
            margin: 10px 0;
        }

        .start-screen .hint {
            font-size: 16px;
            color: #ff8c00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ui">
            <div class="score">Score: <span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="game-over" id="gameOverScreen">
            <h1>☠️ GAME OVER ☠️</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="highScore">0</span></p>
            <button onclick="location.reload()">RESTART</button>
        </div>
        <div class="start-screen" id="startScreen">
            <h1>FLAPPY BIRD</h1>
            <p>APOCALYPSE</p>
            <div class="hint">↑ TAP or CLICK to START ↑</div>
        </div>
        <div class="instructions">TAP or CLICK to fly • Avoid pipes</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth > 600 ? 600 : window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game objects
        const game = {
            score: 0,
            highScore: localStorage.getItem('flappyBirdHighScore') || 0,
            gameOver: false,
            started: false
        };

        const bird = {
            x: canvas.width * 0.2,
            y: canvas.height / 2,
            radius: 15,
            velocity: 0,
            gravity: 0.35,
            lift: -5,
            color: '#ff6b00'
        };

        const pipes = [];
        const pipeGap = 210;
        const pipeWidth = 50;
        let pipeCounter = 0;
        const version = '1.4';
        let scrollOffset = 0;

        // Audio context for sound effects
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = 'sine') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }

        function jumpSound() {
            playSound(400, 0.1);
        }

        function scoreSound() {
            playSound(800, 0.15);
            setTimeout(() => playSound(1000, 0.15), 75);
        }

        function gameOverSound() {
            playSound(200, 0.5);
        }

        let musicPlaying = false;

        function playStartMusic() {
            if (musicPlaying) return;
            musicPlaying = true;

            const melody = [
                { freq: 330, duration: 0.3 },   // E
                { freq: 330, duration: 0.3 },   // E
                { freq: 330, duration: 0.3 },   // E
                { freq: 220, duration: 0.2 },   // A
                { freq: 330, duration: 0.3 },   // E
                { freq: 440, duration: 0.5 },   // A
                { freq: 220, duration: 0.3 },   // A
                { freq: 165, duration: 0.4 },   // E low
                { freq: 330, duration: 0.3 },   // E
                { freq: 220, duration: 0.2 },   // A
            ];

            let delay = 0;
            melody.forEach(note => {
                setTimeout(() => {
                    if (musicPlaying) {
                        playSound(note.freq, note.duration, 'sawtooth');
                    }
                }, delay * 1000);
                delay += note.duration + 0.05;
            });

            // Loop the music every 3 seconds
            setTimeout(() => {
                if (musicPlaying) playStartMusic();
            }, 3500);
        }

        function stopStartMusic() {
            musicPlaying = false;
        }

        // Draw bird
        function drawBird() {
            ctx.fillStyle = bird.color;
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
            ctx.fill();

            // Bird eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + 5, bird.y - 3, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw pipes
        function drawPipes() {
            pipes.forEach(pipe => {
                // Top pipe
                const topGradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                topGradient.addColorStop(0, '#660000');
                topGradient.addColorStop(0.5, '#8b0000');
                topGradient.addColorStop(1, '#660000');
                ctx.fillStyle = topGradient;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);

                // Top pipe rim
                ctx.fillStyle = '#ff4500';
                ctx.fillRect(pipe.x, pipe.top - 8, pipeWidth, 8);
                ctx.fillStyle = '#ff6b00';
                ctx.fillRect(pipe.x + 2, pipe.top - 6, pipeWidth - 4, 4);

                // Bottom pipe
                const botGradient = ctx.createLinearGradient(pipe.x, pipe.bottom, pipe.x + pipeWidth, pipe.bottom);
                botGradient.addColorStop(0, '#660000');
                botGradient.addColorStop(0.5, '#8b0000');
                botGradient.addColorStop(1, '#660000');
                ctx.fillStyle = botGradient;
                ctx.fillRect(pipe.x, pipe.bottom, pipeWidth, canvas.height - pipe.bottom);

                // Bottom pipe rim
                ctx.fillStyle = '#ff4500';
                ctx.fillRect(pipe.x, pipe.bottom, pipeWidth, 8);
                ctx.fillStyle = '#ff6b00';
                ctx.fillRect(pipe.x + 2, pipe.bottom + 2, pipeWidth - 4, 4);
            });
        }

        // Draw background
        function drawBackground() {
            // Sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#3d0a00');
            skyGradient.addColorStop(0.5, '#2d0a00');
            skyGradient.addColorStop(1, '#1a0000');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Parallax ground layers
            const groundY = canvas.height * 0.85;
            ctx.fillStyle = '#4a1a00';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

            // Scrolling ground pattern
            ctx.strokeStyle = 'rgba(255, 107, 0, 0.2)';
            ctx.lineWidth = 1;
            for (let i = -1; i < 3; i++) {
                const x = (i * 60 + scrollOffset) % canvas.width;
                ctx.beginPath();
                ctx.moveTo(x, groundY);
                ctx.lineTo(x + 30, groundY - 10);
                ctx.stroke();
            }

            // Dust particles effect
            ctx.fillStyle = 'rgba(255, 107, 0, 0.1)';
            for (let i = 0; i < 5; i++) {
                const x = (i * 120 + scrollOffset * 0.5) % canvas.width;
                ctx.beginPath();
                ctx.arc(x, canvas.height * 0.4, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Update game
        function update() {
            if (game.gameOver || !game.started) return;

            scrollOffset += 1;

            // Bird physics
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Generate pipes
            pipeCounter++;
            if (pipeCounter > 90) {
                const gapStart = Math.random() * (canvas.height - pipeGap - 50) + 25;
                pipes.push({
                    x: canvas.width,
                    top: gapStart,
                    bottom: gapStart + pipeGap,
                    scored: false
                });
                pipeCounter = 0;
            }

            // Update pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= 3;

                // Score
                if (!pipe.scored && pipe.x + pipeWidth < bird.x) {
                    pipe.scored = true;
                    game.score++;
                    document.getElementById('score').textContent = game.score;
                    scoreSound();
                }

                // Remove off-screen pipes
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                }
            });

            // Collision detection
            if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
                endGame();
            }

            pipes.forEach(pipe => {
                if (
                    bird.x + bird.radius > pipe.x &&
                    bird.x - bird.radius < pipe.x + pipeWidth &&
                    (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.bottom)
                ) {
                    endGame();
                }
            });
        }

        // Draw game
        function draw() {
            drawBackground();
            drawPipes();
            drawBird();

            // Version text
            ctx.fillStyle = '#ff6b00';
            ctx.font = '14px Arial';
            ctx.fillText('v' + version, 10, 25);
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // End game
        function endGame() {
            game.gameOver = true;
            gameOverSound();
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = game.score;

            if (game.score > game.highScore) {
                game.highScore = game.score;
                localStorage.setItem('flappyBirdHighScore', game.highScore);
            }
            document.getElementById('highScore').textContent = game.highScore;
        }

        // Controls - tap/click to fly
        document.addEventListener('click', fly);
        document.addEventListener('touchstart', fly);

        function fly(e) {
            e.preventDefault();

            if (!game.started) {
                game.started = true;
                document.getElementById('startScreen').style.display = 'none';
                stopStartMusic();
            }

            bird.velocity = bird.lift;
            jumpSound();
        }

        // Start game
        gameLoop();
        playStartMusic();
        document.getElementById('highScore').textContent = game.highScore;
    </script>
</body>
</html>
